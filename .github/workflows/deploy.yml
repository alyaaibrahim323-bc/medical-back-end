name: Deploy via Ansible (build on VPS, no migrations)

on:
  push:
    branches: [ main1 ]
  workflow_dispatch:

concurrency:
  group: rashaka-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-22.04  # أبعد عن زحام ubuntu-latest
    steps:
      - name: Checkout (for ansible files & source)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible + docker collection
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9"
          ansible-galaxy collection install community.docker

      - name: Write SSH key for VPS
        run: |
          set -euo pipefail
          umask 077
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > vps_key
          chmod 600 vps_key
          ssh-keygen -y -f vps_key > /dev/null

      # نبني أرتيفاكت من السورس بدل ما ال-VPS يعمل git pull
      - name: Create release artifact (tar.gz)
        run: |
          git archive --format=tar.gz -o /tmp/release.tar.gz HEAD
          ls -lh /tmp/release.tar.gz 

      - name: Copy artifact to VPS
        run: |
          ssh -i vps_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /root/Dashboard-Rashaka-V9"
          scp -i vps_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            /tmp/release.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/Dashboard-Rashaka-V9/release.tar.gz

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook .ansible/deploy.yml \
            -i "${{ secrets.VPS_HOST }}," \
            -u "${{ secrets.VPS_USER }}" \
            --private-key vps_key \
            -b \
            -e "artifact=/root/Dashboard-Rashaka-V9/release.tar.gz"
